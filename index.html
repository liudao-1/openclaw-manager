<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: #12121a;
      border-right: 1px solid #2a2a3a;
      padding: 20px;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .nav-item {
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.2s;
      color: #888;
    }
    
    .nav-item:hover {
      background: #1a1a24;
      color: #fff;
    }
    
    .nav-item.active {
      background: #7c3aed20;
      color: #a855f7;
    }
    
    .main {
      margin-left: 240px;
      padding: 30px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 600;
    }
    
    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      background: #22c55e20;
      color: #22c55e;
    }
    
    .status-badge.offline {
      background: #ef444420;
      color: #ef4444;
    }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 24px;
    }
    
    .card-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .card-value {
      font-size: 32px;
      font-weight: 600;
    }
    
    .card-value.purple {
      color: #a855f7;
    }
    
    .card-value.green {
      color: #22c55e;
    }
    
    .card-value.blue {
      color: #3b82f6;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    
    .skill-card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .skill-card:hover {
      border-color: #7c3aed;
      transform: translateY(-2px);
    }
    
    .skill-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .skill-status {
      font-size: 12px;
      color: #22c55e;
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #7c3aed;
      color: white;
    }
    
    .btn-primary:hover {
      background: #6d28d9;
    }
    
    .actions {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">🦊</div>
      OpenClaw
    </div>
    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Skills</div>
    <div class="nav-item">Sessions</div>
    <div class="nav-item">Settings</div>
  </div>
  
  <div class="main">
    <div class="header">
      <h1>Dashboard</h1>
      <span class="status-badge">● Online</span>
    </div>
    
    <div class="cards">
      <div class="card">
        <div class="card-title">Active Sessions</div>
        <div class="card-value purple">3</div>
      </div>
      <div class="card">
        <div class="card-title">Installed Skills</div>
        <div class="card-value green" id="skill-count">54</div>
      </div>
      <div class="card">
        <div class="card-title">Messages Today</div>
        <div class="card-value blue">127</div>
      </div>
    </div>
    
    <div class="section-title">Recent Skills</div>
    <div class="skill-grid" id="skill-grid">
      <div class="skill-card">
        <div class="skill-name">skill-vetter</div>
        <div class="skill-status">● Installed</div>
      </div>
      <div class="skill-card">
        <div class="skill-name">self-improving-agent</div>
        <div class="skill-status">● Installed</div>
      </div>
      <div class="skill-card">
        <div class="skill-name">proactive-agent</div>
        <div class="skill-status">● Installed</div>
      </div>
      <div class="skill-card">
        <div class="skill-name">agent-browser</div>
        <div class="skill-status">● Installed</div>
      </div>
      <div class="skill-card">
        <div class="skill-name">tavily</div>
        <div class="skill-status">● Installed</div>
      </div>
      <div class="skill-card">
        <div class="skill-name">office</div>
        <div class="skill-status">● Installed</div>
      </div>
    </div>
  </div>
  
  <script>
    // Load skills from localStorage or use defaults
    async function loadSkills() {
      try {
        const response = await fetch('/api/skills');
        const skills = await response.json();
        document.getElementById('skill-count').textContent = skills.length;
        
        const grid = document.getElementById('skill-grid');
        grid.innerHTML = skills.slice(0, 6).map(skill => `
          <div class="skill-card">
            <div class="skill-name">${skill.name}</div>
            <div class="skill-status">● ${skill.status || 'Installed'}</div>
          </div>
        `).join('');
      } catch (e) {
        console.log('Using default skills');
      }
    }
    
    loadSkills();
  </script>
</body>
</html>
