<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 管理器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: #12121a;
      border-right: 1px solid #2a2a3a;
      padding: 20px;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .nav-item {
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.2s;
      color: #888;
    }
    
    .nav-item:hover { background: #1a1a24; color: #fff; }
    .nav-item.active { background: #7c3aed20; color: #a855f7; }
    
    .main { margin-left: 240px; padding: 30px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .header h1 { font-size: 28px; font-weight: 600; }
    
    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      background: #22c55e20;
      color: #22c55e;
    }
    
    .status-badge.offline { background: #ef444420; color: #ef4444; }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 24px;
    }
    
    .card-title { font-size: 14px; color: #666; margin-bottom: 8px; }
    .card-value { font-size: 32px; font-weight: 600; }
    .card-value.purple { color: #a855f7; }
    .card-value.green { color: #22c55e; }
    .card-value.blue { color: #3b82f6; }
    
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    
    .skill-card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 16px;
      transition: all 0.2s;
    }
    
    .skill-card:hover { border-color: #7c3aed; }
    .skill-name { font-weight: 600; margin-bottom: 4px; }
    .skill-status { font-size: 12px; color: #22c55e; }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-danger { background: #ef4444; color: white; }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2a2a3a;
    }
    
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #666; }
    .info-value { color: #a855f7; font-weight: 500; }
    
    /* Chat Styles */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 120px);
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .message.user {
      align-self: flex-end;
      background: #7c3aed;
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.assistant {
      align-self: flex-start;
      background: #1a1a24;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    
    .message img, .message video {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 8px;
    }
    
    .message-time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
    }
    
    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #2a2a3a;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    
    .chat-input {
      flex: 1;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
    }
    
    .chat-input:focus {
      outline: none;
      border-color: #7c3aed;
    }
    
    .chat-actions {
      display: flex;
      gap: 8px;
    }
    
    .chat-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid #2a2a3a;
      background: #1a1a24;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
    }
    
    .chat-btn:hover {
      background: #2a2a3a;
      color: #fff;
    }
    
    .chat-btn.send {
      background: #7c3aed;
      border-color: #7c3aed;
      color: white;
    }
    
    .chat-btn.send:hover {
      background: #6d28d9;
    }
    
    .file-input {
      display: none;
    }
    
    .typing-indicator {
      padding: 12px 16px;
      background: #1a1a24;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      display: none;
    }
    
    .typing-indicator.active {
      display: flex;
      gap: 4px;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: #666;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">🦊</div>
      OpenClaw
    </div>
    <div class="nav-item active" onclick="showPage('dashboard')">控制台</div>
    <div class="nav-item" onclick="showPage('skills')">技能库</div>
    <div class="nav-item" onclick="showPage('chat')">💬 聊天</div>
    <div class="nav-item" onclick="showPage('settings')">设置</div>
  </div>
  
  <div class="main" id="dashboard-page">
    <div class="header">
      <h1>控制台</h1>
      <span class="status-badge" id="gateway-status">● 检查中...</span>
    </div>
    
    <div class="cards">
      <div class="card">
        <div class="card-title">Gateway 状态</div>
        <div class="card-value green" id="status-value">-</div>
      </div>
      <div class="card">
        <div class="card-title">已安装技能</div>
        <div class="card-value purple" id="skill-count">-</div>
      </div>
      <div class="card">
        <div class="card-title">版本</div>
        <div class="card-value blue">2026.3.12</div>
      </div>
    </div>
    
    <div class="section-title">已安装技能</div>
    <div class="skill-grid" id="skill-grid"></div>
  </div>
  
  <div class="main" id="skills-page" style="display:none;">
    <div class="header">
      <h1>技能库</h1>
    </div>
    <div class="skill-grid" id="all-skills-grid"></div>
  </div>
  
  <div class="main" id="chat-page" style="display:none;">
    <div class="header">
      <h1>💬 与 AI 聊天</h1>
    </div>
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <div class="message assistant">
          你好！我是 OpenClaw AI 助手。
          <div class="message-time">现在</div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="file" id="file-input" class="file-input" accept="image/*,video/*">
        <button class="chat-btn" onclick="document.getElementById('file-input').click()" title="发送图片/视频">📎</button>
        <textarea class="chat-input" id="chat-input" placeholder="输入消息..." rows="1" onkeydown="handleChatKeydown(event)"></textarea>
        <button class="chat-btn send" onclick="sendMessage()" title="发送">➤</button>
      </div>
    </div>
  </div>
  
  <div class="main" id="settings-page" style="display:none;">
    <div class="header">
      <h1>设置</h1>
    </div>
    <div class="card" style="max-width: 600px;">
      <div class="card-title">Gateway 配置</div>
      <div id="gateway-info"></div>
    </div>
    <div class="card" style="max-width: 600px; margin-top: 20px;">
      <div class="card-title">操作</div>
      <div style="margin-top: 12px; display: flex; gap: 10px;">
        <button class="btn btn-primary" onclick="restartGateway()">重启 Gateway</button>
        <button class="btn btn-danger" onclick="openDashboard()">打开控制台</button>
      </div>
    </div>
  </div>
  
  <script>
    const skills = [
      'agent-browser', 'find-skills', 'github', 'office', 
      'proactive-agent', 'self-improving-agent', 'skill-vetter', 
      'summarize', 'tavily', 'weather'
    ];
    
    let currentPage = 'dashboard';
    let messages = [];
    
    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('dashboard-page').style.display = page === 'dashboard' ? 'block' : 'none';
      document.getElementById('skills-page').style.display = page === 'skills' ? 'block' : 'none';
      document.getElementById('chat-page').style.display = page === 'chat' ? 'block' : 'none';
      document.getElementById('settings-page').style.display = page === 'settings' ? 'block' : 'none';
      
      if (page === 'settings') loadSettings();
    }
    
    async function checkGateway() {
      try {
        await fetch('http://localhost:18789/', { method: 'HEAD', signal: AbortSignal.timeout(3000) });
        return true;
      } catch (e) { return false; }
    }
    
    async function loadDashboard() {
      const statusEl = document.getElementById('gateway-status');
      const valueEl = document.getElementById('status-value');
      
      const isOnline = await checkGateway();
      
      if (isOnline) {
        statusEl.innerHTML = '● 在线';
        statusEl.classList.remove('offline');
        valueEl.innerHTML = '运行中';
        valueEl.className = 'card-value green';
      } else {
        statusEl.innerHTML = '● 离线';
        statusEl.classList.add('offline');
        valueEl.innerHTML = '已停止';
        valueEl.className = 'card-value';
      }
      
      document.getElementById('skill-count').textContent = skills.length;
      
      const html = skills.map(name => `
        <div class="skill-card">
          <div class="skill-name">${name}</div>
          <div class="skill-status">● 已安装</div>
        </div>
      `).join('');
      
      document.getElementById('skill-grid').innerHTML = html;
      document.getElementById('all-skills-grid').innerHTML = html;
    }
    
    async function loadSettings() {
      const info = document.getElementById('gateway-info');
      const isOnline = await checkGateway();
      
      info.innerHTML = `
        <div class="info-row">
          <span class="info-label">状态</span>
          <span class="info-value">${isOnline ? '在线' : '离线'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">端口</span>
          <span class="info-value">18789</span>
        </div>
        <div class="info-row">
          <span class="info-label">版本</span>
          <span class="info-value">2026.3.12</span>
        </div>
        <div class="info-row">
          <span class="info-label">绑定地址</span>
          <span class="info-value">127.0.0.1</span>
        </div>
      `;
    }
    
    function restartGateway() {
      if (confirm('确定要重启 Gateway 吗？')) {
        alert('重启请求已发送');
      }
    }
    
    function openDashboard() {
      window.open('http://localhost:18789/', '_blank');
    }
    
    // Chat functions
    let pendingFiles = [];
    
    document.getElementById('file-input').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      if (files.length > 0) {
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = function(event) {
            pendingFiles.push({
              name: file.name,
              type: file.type,
              data: event.target.result
            });
            addSystemMessage(`📎 已添加文件: ${file.name}`);
          };
          reader.readAsDataURL(file);
        });
      }
      this.value = '';
    });
    
    function handleChatKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
    
    function addSystemMessage(text) {
      const messagesEl = document.getElementById('chat-messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message assistant';
      msgDiv.innerHTML = `${text}<div class="message-time">${new Date().toLocaleTimeString()}</div>`;
      messagesEl.insertBefore(msgDiv, document.getElementById('typing-indicator'));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function addUserMessage(content, attachments = []) {
      const messagesEl = document.getElementById('chat-messages');
      let contentHtml = content;
      
      attachments.forEach(att => {
        if (att.type.startsWith('image/')) {
          contentHtml += `<img src="${att.data}" alt="${att.name}">`;
        } else if (att.type.startsWith('video/')) {
          contentHtml += `<video src="${att.data}" controls></video>`;
        }
      });
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message user';
      msgDiv.innerHTML = `${contentHtml}<div class="message-time">${new Date().toLocaleTimeString()}</div>`;
      messagesEl.insertBefore(msgDiv, document.getElementById('typing-indicator'));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function addAssistantMessage(content) {
      const messagesEl = document.getElementById('chat-messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message assistant';
      msgDiv.innerHTML = `${content}<div class="message-time">${new Date().toLocaleTimeString()}</div>`;
      messagesEl.insertBefore(msgDiv, document.getElementById('typing-indicator'));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const content = input.value.trim();
      const attachments = [...pendingFiles];
      
      if (!content && attachments.length === 0) return;
      
      addUserMessage(content, attachments);
      input.value = '';
      pendingFiles = [];
      
      // Show typing indicator
      document.getElementById('typing-indicator').classList.add('active');
      
      // Simulate response (in real implementation, this would call the OpenClaw API)
      setTimeout(() => {
        document.getElementById('typing-indicator').classList.remove('active');
        
        const responses = [
          "收到你的消息了！有什么我可以帮你的吗？",
          "好的，让我来处理这个。你想要我做什么？",
          "我明白了。有什么具体的要求吗？",
          "收到！如果需要更多帮助随时告诉我。",
        ];
        
        addAssistantMessage(responses[Math.floor(Math.random() * responses.length)]);
      }, 1000 + Math.random() * 1500);
    }
    
    loadDashboard();
    setInterval(loadDashboard, 10000);
  </script>
</body>
</html>
